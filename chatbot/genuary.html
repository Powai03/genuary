<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Genuary 2026 - Dex & Bot</title>
    <style>
        :root { --dex-red: #dc0a2d; --accent: #00f2ff; }
        body { margin: 0; background: #2c3e50; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .pokedex { width: 950px; height: 750px; display: flex; background: var(--dex-red); border: 4px solid #000; border-radius: 20px; overflow: hidden; box-shadow: 20px 20px 0 #0000004d; }
        .left { width: 40%; padding: 20px; border-right: 6px solid #8b0000; display: flex; flex-direction: column; }
        .right { width: 60%; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .screen-list { background: #333; border: 10px solid #dedede; border-radius: 8px; flex-grow: 1; overflow-y: auto; padding: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .day { background: #111; color: #0f0; padding: 8px; border: 1px solid #444; font-family: monospace; cursor: pointer; text-align: center; font-size: 0.8rem; }
        .day:hover { background: #0f0; color: #000; }
        .sketch-box { background: #000; border: 10px solid #dedede; border-radius: 8px; height: 320px; }
        
        #chat-box { background: #000; border: 3px solid #000; flex-grow: 1; overflow: hidden; }
        .info-bar { background: #52ae5f; border: 3px solid #000; padding: 8px; font-family: monospace; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="pokedex">
        <div class="left">
            <div style="width:40px; height:40px; background:cyan; border-radius:50%; border:3px solid #fff; margin-bottom:15px;"></div>
            <div class="screen-list"><div class="grid" id="grid"></div></div>
        </div>

        <div class="right">
            <div class="sketch-box">
                <iframe id="frame" src="about:blank" style="width:100%; height:100%; border:none;"></iframe>
            </div>
            <div class="info-bar" id="status">EN ATTENTE...</div>
            
            <div id="chat-box">
                <iframe src="chatbot-frame.html" style="width:100%; height:100%; border:none;"></iframe>
            </div>
        </div>
    </div>

    <script>
    const prompts = ["One color, one shape.", "Twelve principles of animation.", "Fibonacci forever.", "Lowres.", "Write “Genuary”.", "Lights on/off.", "Boolean algebra.", "A City.", "Crazy automaton.", "Polar coordinates.", "Quine.", "Boxes only.", "Self portrait.", "Everything fits perfectly.", "Invisible object.", "Order and disorder.", "Wallpaper group.", "Unexpected path.", "16x16", "One line.", "Bauhaus Poster.", "Pen plotter ready.", "Transparency.", "Perfectionist’s nightmare.", "Organic Geometry.", "Recursive Grids.", "Lifeform.", "HTML only.", "Genetic evolution.", "Its not a bug.", "GLSL day"];
    
    prompts.forEach((p, i) => {
        let d = i + 1;
        let b = document.createElement('div');
        b.className = 'day';
        b.innerText = `#${d.toString().padStart(3,'0')}`;
        b.onclick = () => {
            document.getElementById('frame').src = `sketch-frame.html?day=${d}`;
            document.getElementById('status').innerText = `ID #${d} : ${p}`;
        };
        document.getElementById('grid').appendChild(b);
    });
    </script>
</body>
</html>
