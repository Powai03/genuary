<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <script src="p5js/p5.min.js"></script>
    <script src="v3ga/dessins_geometriques/init_trace.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
    
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; }
        nav { padding: 15px; background: #333; display: flex; gap: 20px; align-items: center; }
        a { color: #00d4ff; text-decoration: none; font-weight: bold; }
        main { display: flex; justify-content: center; padding-top: 20px; }
    </style>
</head>
<body>
    <nav>
        <a href="genuary.html">← Retour à la liste</a>
        <span id="title">Chargement...</span>
    </nav>
    <main id="sketch-holder"></main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const day = params.get('day') || "1";
        document.getElementById('title').innerText = "Genuary 2026 - Jour " + day;

        // On charge le script qui est dans le même dossier
        const s = document.createElement('script');
        s.src = `sketch copy ${day}.js`; 
        
        // Optionnel : s'assurer que le script s'exécute après le chargement des libs
        s.onload = () => console.log(`Jour ${day} chargé`);
        document.body.appendChild(s);
    </script>
</body>
</html>
